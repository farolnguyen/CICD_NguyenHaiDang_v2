# =====================================================
# CI/CD PIPELINE - NGUYEN HAI DANG - 2280600668
# Quy trinh day du:
#   Buoc 1: Checkout  - Lay code tu GitHub
#   Buoc 2: Login     - Dang nhap Docker Hub
#   Buoc 3: Build     - Dong goi thanh Image
#   Buoc 4: Push      - Day Image len Docker Hub
#   Buoc 5: Deploy    - Trien khai len DevOps Classroom
# =====================================================

name: "CI/CD Pipeline - Nguyen Hai Dang"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  cicd-pipeline:
    name: Chay toan bo quy trinh CI/CD
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------
      # BUOC 1: CHECKOUT - Lay code tu GitHub
      # Action: actions/checkout
      # -----------------------------------------------
      - name: "Buoc 1 - Checkout: Lay source code tu GitHub"
        uses: actions/checkout@v4

      - name: "Buoc 1 - Kiem tra code da duoc lay thanh cong"
        run: |
          echo "=============================="
          echo "  CODE DA DUOC LAY THANH CONG"
          echo "=============================="
          echo "Repository : ${{ github.repository }}"
          echo "Branch     : ${{ github.ref_name }}"
          echo "Commit     : ${{ github.sha }}"
          echo "Sinh vien  : Nguyen Hai Dang - 2280600668"
          echo ""
          echo "Danh sach file trong du an:"
          ls -la

      # -----------------------------------------------
      # BUOC 2: DOCKER LOGIN - Dang nhap Docker Hub
      # Action: docker/login-action
      # -----------------------------------------------
      - name: "Buoc 2 - Docker Login: Dang nhap Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.SECRETNAME }}
          password: ${{ secrets.DOCKERSECRET }}

      - name: "Buoc 2 - Xac nhan dang nhap thanh cong"
        run: |
          echo "=============================="
          echo "  DANG NHAP DOCKER HUB OK!"
          echo "=============================="
          echo "User       : ${{ secrets.SECRETNAME }}"
          echo "Sinh vien  : Nguyen Hai Dang - 2280600668"
          echo "Trang thai : Dang nhap thanh cong!"

      # -----------------------------------------------
      # BUOC 3A: BUILD & PUSH - Image Bai 1
      # Action: docker/build-push-action
      # (Standalone - khong can MySQL)
      # -----------------------------------------------
      - name: "Buoc 3A - Build & Push: Image Bai 1 (Dockerfile)"
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.SECRETNAME }}/demo-docker-bai1:latest

      # -----------------------------------------------
      # BUOC 3B: BUILD & PUSH - Image Bai 2
      # (Docker Compose + MySQL)
      # -----------------------------------------------
      - name: "Buoc 3B - Build & Push: Image Bai 2 (Docker Compose)"
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.SECRETNAME }}/demo-docker-bai2:latest

      # -----------------------------------------------
      # Tong ket Build & Push
      # -----------------------------------------------
      - name: "Tong ket - In ket qua Build & Push"
        run: |
          echo "============================================"
          echo "  BUILD & PUSH HOAN THANH THANH CONG!"
          echo "============================================"
          echo "Sinh vien : Nguyen Hai Dang - 2280600668"
          echo "Image 1   : ${{ secrets.SECRETNAME }}/demo-docker-bai1:latest"
          echo "Image 2   : ${{ secrets.SECRETNAME }}/demo-docker-bai2:latest"
          echo "Commit    : ${{ github.sha }}"
          echo "Time      : $(date)"

      # -----------------------------------------------
      # BUOC 4: DEPLOY - Trien khai len DevOps Classroom
      # -----------------------------------------------
      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="farolnguyen824/demo-docker-bai2"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=1&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
