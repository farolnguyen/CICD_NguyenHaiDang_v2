spring.application.name=NguyenHaiDang2280600668demodocker

# =====================================================
# DATABASE CONFIG
# Bai 1 (standalone): dung H2 in-memory mac dinh
# Bai 2 (docker-compose): env vars ghi de bang MySQL
# =====================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:demo_docker_db;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 Console (chi hoat dong khi dung H2 - Bai 1)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
